name: CleanMac
options:
  deploymentTarget:
    macOS: "13.0"
  bundleIdPrefix: com.cleanmac
targets:
  CleanMac:
    type: application
    platform: macOS
    sources: [.]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cleanmac.app
        INFOPLIST_KEY_LSUIElement: true
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleShortVersionString: "1.0"
        INFOPLIST_KEY_CFBundleVersion: "1"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
