name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "minor"
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0.1"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Bump version
        id: version
        run: |
          chmod +x scripts/release.sh
          ./scripts/release.sh bump_version ${{ github.event.inputs.version_type }}

      - name: Generate changelog
        id: changelog
        run: ./scripts/release.sh changelog ${{ steps.version.outputs.version }} ${{ steps.version.outputs.version_type }}

      - name: Build & Package
        id: build
        run: |
          DMG_NAME=$(./scripts/release.sh build ${{ steps.version.outputs.version }})
          echo "dmg_name=$DMG_NAME" >> $GITHUB_OUTPUT
          echo "Found DMG: $DMG_NAME"

      - name: Commit & Push
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git add src/project.yml
          git add CHANGELOG.md
          git commit -m "chore: release v$VERSION"
          git push origin main
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: false
          body: ${{ steps.changelog.outputs.body }}
          files: ${{ steps.build.outputs.dmg_name }}
